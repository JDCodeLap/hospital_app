<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환자 통합 화면 — 목업</title>
<style>
  :root{
    --bg-base:#0f172a; --bg-surface:#1e293b; --bg-elevated:#334155;
    --border:#334155; --text:#f1f5f9; --text2:#94a3b8; --text3:#64748b;
    --accent:#38bdf8; --accent-on:#0f172a;
    --danger:#f87171; --danger-bg:#3a1d1d; --warning:#fbbf24; --success:#34d399;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard','Malgun Gothic',-apple-system,sans-serif;
    background:#0a0f1d; color:var(--text); padding:24px 12px; line-height:1.5;
  }
  .caption{text-align:center;color:var(--text2);font-size:13px;margin-bottom:18px;}
  /* 아웃라인 아이콘 공통: 선 굵기 통일, currentColor로 색 상속 */
  .ic{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;
      stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;display:inline-block;vertical-align:middle;}
  .ic-sm{width:16px;height:16px;}
  .ic-lg{width:22px;height:22px;}
  .phone{
    max-width:390px; margin:0 auto; background:var(--bg-base);
    border-radius:28px; overflow:hidden; border:1px solid var(--border);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  /* 상단바 */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px; background:var(--bg-surface); border-bottom:1px solid var(--border);
  }
  .topbar .back{color:var(--text2); display:flex;}
  .topbar .title{font-weight:700; font-size:16px;}
  .bell{position:relative; color:var(--text); display:flex;}
  .bell .dot{
    position:absolute; top:-5px; right:-7px; background:var(--danger);
    color:#1a0a0a; font-size:10px; font-weight:700; border-radius:9999px;
    padding:1px 5px; line-height:1.3;
  }
  .body{padding:16px;}
  /* 경고 배너 */
  .alert{
    background:var(--danger-bg); color:var(--danger);
    border:1px solid #7f3a3a; border-radius:12px; padding:12px 14px;
    font-weight:700; font-size:14px; display:flex; align-items:center; gap:9px;
    margin-bottom:16px;
  }
  /* 환자 헤더 */
  .phead{display:flex; align-items:center; gap:12px; margin-bottom:8px;}
  .avatar{width:52px;height:52px;border-radius:9999px;background:var(--bg-elevated);
          flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--accent);}
  .avatar .ic{width:28px;height:28px;}
  .phead .name{font-size:20px;font-weight:700;}
  .phead .meta{font-size:13px;color:var(--text2);}
  /* 단계 타임라인 */
  .timeline{display:flex; margin:18px 0 22px; padding:0 4px;}
  .tnode{flex:1; text-align:center; font-size:11px; color:var(--text3); position:relative;}
  .tnode::before, .tnode::after{
    content:""; position:absolute; top:11px; height:3px; background:var(--bg-elevated); z-index:0;}
  .tnode::before{left:0; width:50%;}
  .tnode::after{right:0; width:50%;}
  .tnode:first-child::before{display:none;}
  .tnode:last-child::after{display:none;}
  .tnode.done::before, .tnode.done::after{background:var(--success);}
  .tnode.now::before{background:var(--success);}
  .dot2{
    width:24px; height:24px; border-radius:9999px; background:var(--bg-elevated);
    border:3px solid var(--bg-base); margin:0 auto 6px; position:relative; z-index:1;
    display:flex; align-items:center; justify-content:center; color:var(--text3);}
  .dot2 .ic{width:13px;height:13px;stroke-width:2.4;}
  .tnode.done .dot2{background:var(--success); color:#06281c;}
  .tnode.now .dot2{background:var(--accent); color:var(--accent-on);
    box-shadow:0 0 0 4px rgba(56,189,248,0.25);}
  .tnode.now .dot2 .ic{fill:currentColor;stroke:none;}
  .tnode.now{color:var(--accent); font-weight:700;}
  .tnode.done{color:var(--success);}
  /* 정보 카드 */
  .card{
    background:var(--bg-surface); border:1px solid var(--border);
    border-radius:16px; padding:14px; margin-bottom:12px;}
  .card h3{font-size:12px; color:var(--text2); font-weight:600; margin-bottom:10px;
           letter-spacing:0.5px; display:flex; align-items:center; gap:7px; text-transform:uppercase;}
  .card h3 .ic{width:15px;height:15px;color:var(--text2);}
  .row{display:flex; justify-content:space-between; align-items:center; font-size:14px; padding:5px 0;}
  .row .k{color:var(--text2);}
  .row .v{font-weight:600;}
  .pill{display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; padding:3px 10px; border-radius:9999px;}
  .pill .ic{width:12px;height:12px;stroke-width:2.2;}
  .pill.warn{background:rgba(251,191,36,0.15); color:var(--warning);}
  .pill.ok{background:rgba(52,211,153,0.15); color:var(--success);}
  .pill.dgr{background:rgba(248,113,113,0.15); color:var(--danger);}
  /* 체크리스트 */
  .check{display:flex; align-items:center; gap:10px; font-size:14px; padding:7px 0;}
  .box{width:20px;height:20px;border-radius:6px;border:2px solid var(--text3); flex-shrink:0;
       display:flex;align-items:center;justify-content:center;color:transparent;}
  .box .ic{width:12px;height:12px;stroke-width:3;}
  .box.on{background:var(--success); border-color:var(--success); color:#06281c;}
  .check.on{color:var(--text);}
  .check.off{color:var(--text2);}
  /* 버튼 */
  .btn{margin-top:10px; text-align:center; background:var(--accent); color:var(--accent-on);
    font-weight:700; font-size:15px; padding:14px; border-radius:12px;}
  .btn.disabled{background:var(--bg-elevated); color:var(--text3);}
  /* 하단 탭바 */
  .tabbar{display:flex; justify-content:space-around; padding:10px 0 8px; background:var(--bg-surface); border-top:1px solid var(--border);}
  .tab{font-size:11px; color:var(--text3); text-align:center; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tab.active{color:var(--accent);}
</style>
</head>
<body>
  <p class="caption">⭐ 환자 통합 화면 (다크 모드 · 아웃라인 아이콘) — 휴대폰 기준</p>
  <div class="phone">
    <div class="topbar">
      <span class="back">
        <svg class="ic" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </span>
      <span class="title">환자 통합 화면</span>
      <span class="bell">
        <svg class="ic" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="dot">3</span>
      </span>
    </div>

    <div class="body">
      <!-- 위험 경고 -->
      <div class="alert">
        <svg class="ic" viewBox="0 0 24 24"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        페니실린 알레르기 — 처방 시 주의
      </div>

      <!-- 환자 헤더 -->
      <div class="phead">
        <div class="avatar">
          <svg class="ic" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="name">김철수 <span style="font-size:14px;color:var(--text2);font-weight:400;">(58세 · 남)</span></div>
          <div class="meta">등록번호 2024-10583 · 내과</div>
        </div>
      </div>

      <!-- 단계 타임라인 -->
      <div class="timeline">
        <div class="tnode done"><div class="dot2"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>접수</div>
        <div class="tnode now"><div class="dot2"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg></div>진료중</div>
        <div class="tnode"><div class="dot2"></div>검사</div>
        <div class="tnode"><div class="dot2"></div>수납</div>
      </div>

      <!-- 투약 -->
      <div class="card">
        <h3><svg class="ic" viewBox="0 0 24 24"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>투약</h3>
        <div class="row"><span class="k">혈압약 (아침)</span><span class="pill ok"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>완료</span></div>
        <div class="row"><span class="k">항생제 (14:00)</span><span class="pill warn"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>곧 투약</span></div>
      </div>

      <!-- 검사결과 -->
      <div class="card">
        <h3><svg class="ic" viewBox="0 0 24 24"><path d="M9 3h6M10 3v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-8.5V3"/></svg>검사 결과</h3>
        <div class="row"><span class="k">혈액검사</span><span class="v">정상</span></div>
        <div class="row"><span class="k">흉부 X-ray</span><span class="pill dgr"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>결과 대기</span></div>
      </div>

      <!-- 필수 절차 체크리스트 -->
      <div class="card">
        <h3><svg class="ic" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg>검사 전 필수 절차</h3>
        <div class="check on"><span class="box on"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span> 본인 확인</div>
        <div class="check on"><span class="box on"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span> 금식 확인</div>
        <div class="check off"><span class="box"></span> 동의서 서명</div>
        <div class="btn disabled">다음 단계로 (1개 남음)</div>
      </div>
    </div>

    <!-- 하단 탭 -->
    <div class="tabbar">
      <div class="tab">
        <svg class="ic ic-lg" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</div>
      <div class="tab">
        <svg class="ic ic-lg" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>검색</div>
      <div class="tab active">
        <svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>환자</div>
      <div class="tab">
        <svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>알림</div>
      <div class="tab">
        <svg class="ic ic-lg" viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>흐름판</div>
    </div>
  </div>
</body>
</html>
