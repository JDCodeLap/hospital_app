# Render 배포 설계도(Blueprint) — 백엔드(FastAPI 서버) 1개를 정의합니다.
# Render 대시보드에서 "New > Blueprint"로 이 저장소를 연결하면, 이 파일대로 서버가 자동으로 만들어져요.
# ★ 비밀값(DB 주소·토큰 비밀키·허용 출처)은 여기 적지 않습니다(sync: false) → 대시보드에서 직접 입력.
#   (이 저장소는 공개라서, 비밀값을 파일에 적으면 인터넷에 노출됩니다. 그래서 .env에만 두던 규칙과 동일.)
services:
  - type: web
    name: hospital-app-api
    runtime: python
    rootDir: backend # 서버 코드는 backend/ 폴더 안에 있음
    plan: free # 무료 요금제(안 쓰면 잠들었다가 첫 요청에 깨어남 — 데모용으로 충분)
    region: singapore # 한국에서 가장 가까운 Render 지역
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health # 이 주소가 ok면 서버가 살아있다고 판단
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7" # 모든 라이브러리가 안정적으로 설치되는 버전으로 고정
      - key: DATABASE_URL
        sync: false # ← 대시보드에서 직접 입력(backend/.env의 값 그대로)
      - key: JWT_SECRET_KEY
        sync: false # ← 대시보드에서 직접 입력
      - key: CORS_ORIGINS
        sync: false # ← 화면(Vercel) 주소가 나오면 그 주소를 입력
